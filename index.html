<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Album</title>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
text-align:center;
overflow:hidden;
}

.page{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
opacity:0;
transform:translateX(50px);
pointer-events:none;
transition:all 0.6s ease;
}

.active{
opacity:1;
transform:translateX(0);
pointer-events:auto;
}

.page.exit{
opacity:0;
transform:translateX(-50px);
}

button{
padding:10px 20px;
margin:10px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

.yes{ background:#4CAF50; color:white; }
.no{ background:#f44336; color:white; }

.timer{
font-size:18px;
color:#ccc;
margin-bottom:10px;
}

.album{
display:flex;
flex-direction:column;
align-items:center;
gap:15px;
}

.slideshow{
position:relative;
width:320px;
height:320px;
}

.slide{
width:320px;
height:320px;
object-fit:cover;
border-radius:12px;
opacity:0;
transition:opacity 1s ease;
position:absolute;
top:0;
left:0;
}

.show{
opacity:1;
}

.arrow{
position:absolute;
top:50%;
transform:translateY(-50%);
font-size:40px;
cursor:pointer;
user-select:none;
color:white;
opacity:0;
transition:opacity 0.5s ease;
}

.left{ left:20px; }
.right{ right:20px; }

.visible{
opacity:1;
}

#typeText{
font-size:26px;
white-space:pre;
}
</style>
</head>

<body>

<div class="page active" id="page1">
<h1>Alondra</h1>
<p>
I made this album to look at some of our pictures together<br>
and I love you. I hope you love this.
</p>
<p>To enter the album you must answer one important question.</p>
<button onclick="goPage(2)">Continue</button>
</div>

<div class="page" id="page2">

<h1 id="typeText"></h1>

<div id="buttons" style="display:none;">
<button class="yes" onclick="goPage(3)">Yes</button>
<button class="no" onclick="noResponse()">No</button>
<p id="msg"></p>
</div>

</div>

<div class="page" id="page3">

<h1>Our Album</h1>

<div class="album">

<div class="timer" id="timer"></div>

<div class="slideshow">

<img class="slide show" src="photo1.jpg">
<img class="slide" src="photo2.jpg">
<img class="slide" src="photo3.jpg">
<img class="slide" src="photo4.jpg">

<div class="arrow left" id="left">&#10094;</div>
<div class="arrow right" id="right">&#10095;</div>

</div>

</div>

</div>

<script>
function goPage(num){
let current=document.querySelector(".active");
let next=document.getElementById("page"+num);

current.classList.add("exit");

setTimeout(()=>{
current.classList.remove("active","exit");
next.classList.add("active");

if(num===2) startSequence();

},300);
}

function noResponse(){
document.getElementById("msg").innerText="That's okay...";
}

/* CINEMATIC SEQUENCE */
let text1="oh wait the question isnt there love i think i forgot it just give me a second";
let text2="Do you love me?";
let i=0;

function startSequence(){
document.body.style.background="#000";
document.getElementById("typeText").innerText="";
document.getElementById("buttons").style.display="none";
i=0;

setTimeout(type1,2000);
}

function type1(){
if(i<text1.length){
document.getElementById("typeText").innerText+=text1[i];
i++;
setTimeout(type1,60);
}else{
setTimeout(deleteText,1200);
}
}

function deleteText(){
let current=document.getElementById("typeText").innerText;

if(current.length>0){
document.getElementById("typeText").innerText=current.slice(0,-1);
setTimeout(deleteText,25);
}else{
i=0;
type2();
}
}

function type2(){
if(i<text2.length){
document.getElementById("typeText").innerText+=text2[i];
i++;
setTimeout(type2,80);
}else{
setTimeout(()=>{
document.getElementById("buttons").style.display="block";
},400);
}
}

/* TIMER */
const startDate=new Date("2025-12-05T00:00:00");

function updateTimer(){
let now=new Date();
let diff=now-startDate;

let seconds=Math.floor(diff/1000);
let minutes=Math.floor(seconds/60);
let hours=Math.floor(minutes/60);
let days=Math.floor(hours/24);

let months=Math.floor(days/30);
days=days%30;
hours=hours%24;
minutes=minutes%60;
seconds=seconds%60;

document.getElementById("timer").innerText=
`Since Dec 5: ${months} months ${days} days ${hours} hours ${minutes} minutes ${seconds} seconds`;
}

setInterval(updateTimer,1000);
updateTimer();

/* SLIDESHOW */
let slides=document.querySelectorAll(".slide");
let index=0;

let left=document.getElementById("left");
let right=document.getElementById("right");

function show(i){
slides.forEach(s=>s.classList.remove("show"));
slides[i].classList.add("show");
}

function enable(){
left.classList.add("visible");
right.classList.add("visible");

left.onclick=()=>{
index=(index-1+slides.length)%slides.length;
show(index);
};

right.onclick=()=>{
index=(index+1)%slides.length;
show(index);
};
}

let auto=setInterval(()=>{
if(index<slides.length-1){
index++;
show(index);
}else{
clearInterval(auto);
enable();
}
},2500);
</script>

</body>
</html>
